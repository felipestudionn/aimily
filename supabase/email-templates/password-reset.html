<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fff6dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fff6dc; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width: 560px; width: 100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <img src="https://www.aimily.app/images/aimily-logo-black.png" alt="aimily" width="120" style="display: block;" />
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background-color: #ffffff; border: 1px solid rgba(40,42,41,0.1); padding: 40px 36px;">
              <h1 style="margin: 0 0 16px; font-size: 24px; font-weight: 300; color: #282A29; letter-spacing: -0.02em;">
                Reset your password
              </h1>
              <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.6; color: #282A29;">
                We received a request to reset your password. Click the button below to choose a new one.
              </p>
              <!-- Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 0 24px;">
                <tr>
                  <td style="background-color: #282A29; padding: 14px 32px;">
                    <a href="{{ .ConfirmationURL }}" style="color: #fff6dc; text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;">
                      Reset password
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin: 0; font-size: 13px; line-height: 1.5; color: rgba(40,42,41,0.5);">
                If you didn't request a password reset, you can safely ignore this email. Your password will remain unchanged.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 24px;">
              <p style="margin: 0; font-size: 12px; color: rgba(40,42,41,0.4);">
                aimily is a product by StudioNN Agency S.L.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
