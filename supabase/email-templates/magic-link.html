<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to aimily</title>
</head>
<body style="margin: 0; padding: 0; background-color: #282A29; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #282A29; padding: 48px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="max-width: 520px; width: 100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 40px;">
              <img src="https://aimily.app/images/aimily-logo-white.png" alt="aimily" width="100" style="display: block;" />
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding: 0 16px; text-align: center;">
              <h1 style="margin: 0 0 20px; font-size: 28px; font-weight: 300; color: #FFFFFF; letter-spacing: -0.02em; line-height: 1.3;">
                Welcome <em style="font-style: italic; font-weight: 300;">back</em>
              </h1>
              <p style="margin: 0 0 32px; font-size: 15px; line-height: 1.7; color: #FAEFE0; opacity: 0.75;">
                Click below to sign in to your account. This link will expire in <em style="font-style: italic;">one hour</em>.
              </p>
              <!-- Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto 32px;">
                <tr>
                  <td style="background-color: #FAEFE0; padding: 14px 36px;">
                    <a href="{{ .ConfirmationURL }}" style="color: #282A29; text-decoration: none; font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
                      Sign in
                    </a>
                  </td>
                </tr>
              </table>
              <!-- Divider -->
              <table role="presentation" width="60" cellpadding="0" cellspacing="0" style="margin: 0 auto 24px;">
                <tr>
                  <td style="border-top: 1px solid rgba(250,239,224,0.15); font-size: 0; line-height: 0;">&nbsp;</td>
                </tr>
              </table>
              <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #FAEFE0; opacity: 0.35;">
                If you didn't request this link, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 40px;">
              <p style="margin: 0; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #FAEFE0; opacity: 0.2;">
                aimily by StudioNN Agency S.L.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
