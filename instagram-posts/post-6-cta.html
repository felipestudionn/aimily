<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #282A29;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .headline {
    color: #FAEFE0;
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 48px;
  }
  .headline em { font-style: italic; }
  .cta {
    display: inline-block;
    color: #282A29;
    background: #FAEFE0;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 18px 48px;
  }
  .sub {
    color: rgba(216,216,216,0.35);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-top: 24px;
  }
  .logo {
    position: absolute;
    bottom: 60px;
    opacity: 0.3;
    height: 18px;
  }
</style>
</head>
<body>
  <h1 class="headline">Your <em>next<br>collection</em><br>starts here.</h1>
  <div class="cta">Start free</div>
  <p class="sub">aimily.app</p>
  <img src="../public/images/aimily-logo-white.png" class="logo" alt="aimily">
</body>
</html>
