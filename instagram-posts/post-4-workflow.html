<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #282A29;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .label {
    color: rgba(216,216,216,0.4);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 64px;
    text-align: center;
  }
  .steps {
    width: 100%;
  }
  .step {
    display: flex;
    align-items: baseline;
    gap: 32px;
    padding: 28px 0;
    border-bottom: 1px solid rgba(216,216,216,0.08);
  }
  .step:last-child { border-bottom: none; }
  .step-num {
    color: rgba(216,216,216,0.15);
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -0.02em;
    flex-shrink: 0;
    width: 80px;
  }
  .step-text {
    color: #FAEFE0;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.01em;
  }
  .step-text em { font-style: italic; }
  .logo {
    position: absolute;
    bottom: 60px;
    opacity: 0.3;
    height: 18px;
  }
</style>
</head>
<body>
  <p class="label">How it works</p>
  <div class="steps">
    <div class="step">
      <span class="step-num">01</span>
      <span class="step-text"><em>Create</em> your collection</span>
    </div>
    <div class="step">
      <span class="step-num">02</span>
      <span class="step-text"><em>Plan</em> & design</span>
    </div>
    <div class="step">
      <span class="step-num">03</span>
      <span class="step-text"><em>Produce</em> & shoot</span>
    </div>
    <div class="step">
      <span class="step-num">04</span>
      <span class="step-text"><em>Launch</em> & sell</span>
    </div>
  </div>
  <img src="../public/images/aimily-logo-white.png" class="logo" alt="aimily">
</body>
</html>
